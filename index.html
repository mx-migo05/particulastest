<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Particulas</title>
 
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(circle at center, #0a0b1e 0%, #020205 100%);
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }
    
        .glass {
            background: rgba(10, 10, 25, 0.55);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
       
        canvas {
            display: block;
            width: 100vw !important;
            height: 100vh !important;
        }
    </style>
</head>
<body class="text-white font-sans selection:bg-purple-500 selection:text-white">

    <div id="canvas-container" class="absolute inset-0 z-0"></div>
    <div id="ui" class="absolute inset-x-0 top-0 z-10 p-4 md:p-6 flex flex-col md:flex-row justify-between items-start gap-4 pointer-events-none">
        
        <div class="glass p-5 rounded-2xl w-full md:max-w-xs pointer-events-auto shadow-xl flex flex-col gap-3">

            <div>
                <span class="text-[10px] uppercase tracking-wider text-purple-400 font-bold"></span>
                <h2 id="current-template" class="text-xl font-extrabold tracking-tight mt-0.5 text-white"></h2>
            </div>
            
            <div class="h-px bg-white/10 my-1"></div>
            
           
            <div class="space-y-2 text-xs text-gray-300">

                <div class="flex items-center gap-3">
                    <span class="text-lg bg-white/5 p-1 rounded-lg w-8 h-8 flex items-center justify-center">🖐️</span>
                    <div>
                        <p class="font-medium">Palma Abierta</p>
                        <p class="text-[10px] text-gray-400">Expande la formación de forma segura</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <span class="text-lg bg-white/5 p-1 rounded-lg w-8 h-8 flex items-center justify-center">✊</span>
                    <div>
                        <p class="font-medium">Puño Cerrado</p>
                        <p class="text-[10px] text-gray-400">Implosión al centro</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <span class="text-lg bg-white/5 p-1 rounded-lg w-8 h-8 flex items-center justify-center">👌</span>
                    <div>
                        <p class="font-medium">Pellizco / Pinza</p>
                        <p class="text-[10px] text-gray-400">Pellizca para cambiar de forma</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <span class="text-lg bg-white/5 p-1 rounded-lg w-8 h-8 flex items-center justify-center">↕️</span>
                    <div>
                        <p class="font-medium">Mover Mano</p>
                        <p class="text-[10px] text-gray-400">Cambia paleta cromática en vivo</p>
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-2 mt-2 px-3 py-1.5 rounded-lg bg-white/5 border border-white/5 text-[11px]">
                <div id="tracking-indicator" class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></div>
                <span id="tracking-text" class="text-gray-400 font-medium">Iniciando cámara...</span>
            </div>
        </div>
    </div>

    <div class="absolute bottom-6 right-6 z-10 flex flex-col items-end gap-2">
        <div id="video-wrapper" class="relative overflow-hidden w-28 h-20 md:w-40 md:h-28 rounded-2xl border border-white/10 shadow-2xl glass transition-all">
            <video id="webcam" class="absolute inset-0 w-full h-full object-cover transform scale-x-[-1]" autoplay playsinline muted></video>
            <div class="absolute inset-0 border-2 border-purple-500/40 rounded-2xl pointer-events-none"></div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

    <script type="module">
        import * as THREE from 'three';

        const PARTICLE_COUNT = 18000;
        let currentTemplateIndex = 0;
        const templates = ['Inicio', 'Corazon', 'Flor', 'Saturno', 'ADN', 'Explosion'];
        
        let hasCamera = false;
        let isPinching = false;
        let activeTracking = false;

        let targetExpansionFactor = 1.0;
        let currentExpansionFactor = 1.0;
        
        let targetRotationSpeedX = 0.002;
        let targetRotationSpeedY = 0.005;
        let currentRotationSpeedX = 0.002;
        let currentRotationSpeedY = 0.005;

        let responsiveScale = 1.0;

        let isUserDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        let rotationAngleX = 0;
        let rotationAngleY = 0;
        let globalTime = 0;

        // Paleta base interactiva inicial
        let currentColors = {
            r1: 0.3, g1: 0.1, b1: 0.9,
            r2: 0.9, g2: 0.1, b2: 0.4
        };

        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x020205, 0.015);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 6;

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        container.appendChild(renderer.domElement);

        function updateResponsiveScale() {
            const aspect = window.innerWidth / window.innerHeight;
            if (aspect < 1) {
                responsiveScale = aspect * 0.95;
            } else {
                responsiveScale = 1.0;
            }
        }
        updateResponsiveScale();

        function createGlowTexture() {
            const size = 64;
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');

            const gradient = ctx.createRadialGradient(size / 2, size / 2, 0, size / 2, size / 2, size / 2);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
            gradient.addColorStop(0.15, 'rgba(230, 210, 255, 0.8)');
            gradient.addColorStop(0.4, 'rgba(120, 50, 240, 0.25)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');

            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, size, size);

            return new THREE.CanvasTexture(canvas);
        }
//ja me mame 
        const particleTexture = createGlowTexture();

        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(PARTICLE_COUNT * 3);
        const colors = new Float32Array(PARTICLE_COUNT * 3);
        const targets = new Float32Array(PARTICLE_COUNT * 3);
        const randomSpeeds = new Float32Array(PARTICLE_COUNT);

        for (let i = 0; i < PARTICLE_COUNT; i++) {
            positions[i * 3] = (Math.random() - 0.5) * 15;
            positions[i * 3 + 1] = (Math.random() - 0.5) * 15;
            positions[i * 3 + 2] = (Math.random() - 0.5) * 15;
            randomSpeeds[i] = 0.4 + Math.random() * 1.2;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const material = new THREE.PointsMaterial({
            size: window.innerWidth < 768 ? 0.08 : 0.065,
            map: particleTexture,
            vertexColors: true,
            transparent: true,
            opacity: 0.9,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        const particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);

        function setTemplate(name) {
            const posAttr = geometry.attributes.position.array;
            document.getElementById('current-template').innerText = `Formación: ${name === 'ADN' ? 'ADN 3D' : name}`;

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const i3 = i * 3;
                let x = 0, y = 0, z = 0;

                if (name === 'Inicio') {
                    const phi = Math.acos(-1 + (2 * i) / PARTICLE_COUNT);
                    const theta = Math.sqrt(PARTICLE_COUNT * Math.PI) * phi;
                    x = Math.cos(theta) * Math.sin(phi) * 1.3;
                    y = Math.sin(theta) * Math.sin(phi) * 1.3;
                    z = Math.cos(phi) * 1.3;
                } 
                else if (name === 'Corazon') {
                    
                    const t = Math.PI * 2 * (i / PARTICLE_COUNT);
                    const angleY = Math.random() * Math.PI * 2;
                    const r = 0.15 + 0.85 * Math.random();
                    
                    x = r * (1.3 * Math.pow(Math.sin(t), 3)) * 0.75;
                    y = r * (1.1 * Math.cos(t) - 0.4 * Math.cos(2*t) - 0.15 * Math.cos(3*t) - 0.08 * Math.cos(4*t)) * 0.75;
                    z = r * (Math.sin(t) * Math.sin(angleY) * 0.6) * 0.75;
                    y -= 0.05; 
                }
                else if (name === 'Flor') {
              
                    const theta = (i / PARTICLE_COUNT) * Math.PI * 2 * 8; 
                    const phi = (i / PARTICLE_COUNT) * Math.PI;
                    const petals = 5;
                    const r = 1.3 * Math.sin(petals * theta) * Math.sin(phi);
                    x = r * Math.cos(theta);
                    y = r * Math.sin(theta);
                    z = (Math.random() - 0.5) * 0.25 + (Math.sin(phi * 2) * 0.18);
                }
                else if (name === 'Saturno') {
         
                    if (i < PARTICLE_COUNT * 0.35) {
                        const phi = Math.acos(-1 + (2 * i) / (PARTICLE_COUNT * 0.35));
                        const theta = Math.sqrt(PARTICLE_COUNT * 0.35 * Math.PI) * phi;
                        x = Math.cos(theta) * Math.sin(phi) * 0.65;
                        y = Math.sin(theta) * Math.sin(phi) * 0.65;
                        z = Math.cos(phi) * 0.65;
                    } else {
                        const angle = Math.random() * Math.PI * 2;
                        const radius = 0.95 + Math.random() * 0.85; 
                        x = Math.cos(angle) * radius;
                        y = (Math.random() - 0.5) * 0.015; 
                        z = Math.sin(angle) * radius;
                    }
                }
                else if (name === 'ADN') {
    
                    const hDist = 2.6; 
                    const turns = 2.5;  
                    const rBase = 0.7;  

                    if (i < PARTICLE_COUNT * 0.4) {
                        const t = (i / (PARTICLE_COUNT * 0.4)) * Math.PI * 2 * turns;
                        const jitterAngle = Math.random() * Math.PI * 2;
                        const jitterR = Math.random() * 0.08; 
                        
                        x = Math.cos(t) * (rBase + jitterR * Math.cos(jitterAngle));
                        z = Math.sin(t) * (rBase + jitterR * Math.cos(jitterAngle));
                        y = (t / (Math.PI * 2 * turns)) * hDist - (hDist / 2) + jitterR * Math.sin(jitterAngle);
                    } 
                    else if (i < PARTICLE_COUNT * 0.8) {
                        const t = ((i - PARTICLE_COUNT * 0.4) / (PARTICLE_COUNT * 0.4)) * Math.PI * 2 * turns;
                        const jitterAngle = Math.random() * Math.PI * 2;
                        const jitterR = Math.random() * 0.08;
                        
                        x = Math.cos(t + Math.PI) * (rBase + jitterR * Math.cos(jitterAngle));
                        z = Math.sin(t + Math.PI) * (rBase + jitterR * Math.cos(jitterAngle));
                        y = (t / (Math.PI * 2 * turns)) * hDist - (hDist / 2) + jitterR * Math.sin(jitterAngle);
                    } 
                    else {
                        const t = Math.random() * Math.PI * 2 * turns;
                        const progress = Math.random(); 
                        
                        const ax = Math.cos(t) * rBase;
                        const az = Math.sin(t) * rBase;
                        const bx = Math.cos(t + Math.PI) * rBase;
                        const bz = Math.sin(t + Math.PI) * rBase;
                        const h = (t / (Math.PI * 2 * turns)) * hDist - (hDist / 2);

                        x = ax + (bx - ax) * progress;
                        z = az + (bz - az) * progress;
                        y = h;

                        x += (Math.random() - 0.5) * 0.03;
                        y += (Math.random() - 0.5) * 0.02;
                        z += (Math.random() - 0.5) * 0.03;
                    }
                }
                else if (name === 'Explosion') {
                    const speed = 0.2 + Math.random() * 1.3;
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.random() * Math.PI;
                    x = speed * Math.sin(phi) * Math.cos(theta);
                    y = speed * Math.sin(phi) * Math.sin(theta);
                    z = speed * Math.cos(phi);
                }

                targets[i3] = x;
                targets[i3 + 1] = y;
                targets[i3 + 2] = z;
            }
        }

        window.changeToShape = function(index) {
            currentTemplateIndex = index;
            setTemplate(templates[currentTemplateIndex]);
        }

        setTemplate('Inicio');
        updateColors();

        function updateColors() {
            const colorAttr = geometry.attributes.color.array;
            const r1 = currentColors.r1, g1 = currentColors.g1, b1 = currentColors.b1;
            const r2 = currentColors.r2, g2 = currentColors.g2, b2 = currentColors.b2;

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const ratio = i / PARTICLE_COUNT;
                colorAttr[i * 3] = r1 + (r2 - r1) * ratio;     // R
                colorAttr[i * 3 + 1] = g1 + (g2 - g1) * ratio; // G
                colorAttr[i * 3 + 2] = b1 + (b2 - b1) * ratio; // B
            }
            geometry.attributes.color.needsUpdate = true;
        }

        const videoElement = document.getElementById('webcam');
        const trackingIndicator = document.getElementById('tracking-indicator');
        const trackingText = document.getElementById('tracking-text');
//camaron caramelo camaron caramelo camaron4
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 0, 
            minDetectionConfidence: 0.4, 
            minTrackingConfidence: 0.4
        });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                if (!activeTracking) {
                    activeTracking = true;
                    trackingIndicator.classList.remove('bg-red-500', 'bg-blue-500');
                    trackingIndicator.classList.add('bg-emerald-500');
                    trackingText.innerText = "Mano detectada";
                    trackingText.classList.add('text-emerald-400');
                }

                const landmarks = results.multiHandLandmarks[0];
                
                const thumb = landmarks[4];
                const index = landmarks[8];
                const distance2D = Math.sqrt(Math.pow(thumb.x - index.x, 2) + Math.pow(thumb.y - index.y, 2));
                
                if (distance2D < 0.05) {
                    if (!isPinching) {
                        isPinching = true;
                        currentTemplateIndex = (currentTemplateIndex + 1) % templates.length;
                        window.changeToShape(currentTemplateIndex);
                    }
                } else if (distance2D > 0.09) {
                    isPinching = false;
                }

                const isOpen = landmarks[12].y < landmarks[9].y; 
                
                targetExpansionFactor = isOpen ? 1.65 : 0.45;
                targetRotationSpeedY = isOpen ? 0.012 : 0.003;
                targetRotationSpeedX = isOpen ? 0.003 : 0.001;

                const xPos = landmarks[0].x; 
                const yPos = landmarks[0].y; 
                
                currentColors.r1 = xPos;
                currentColors.g1 = yPos * 0.4;
                currentColors.b1 = 1.0 - xPos;

                currentColors.r2 = 1.0 - yPos;
                currentColors.g2 = xPos * 0.3;
                currentColors.b2 = yPos;
                
                updateColors();
            } else {

                if (activeTracking) {
                    activeTracking = false;
                    trackingIndicator.classList.remove('bg-emerald-500');
                    trackingIndicator.classList.add('bg-red-500');
                    trackingText.innerText = "Buscando mano...";
                    trackingText.classList.remove('text-emerald-400');
                }
                
        
                targetRotationSpeedY = 0.007; 
                targetRotationSpeedX = 0.0025;
            }
        });

    
        let cameraInitialized = false;

        async function startWebcam() {
            if (cameraInitialized) return;
            try {
                const constraints = {
                    video: {
                        width: { ideal: 640 },
                        height: { ideal: 480 },
                        facingMode: "user"
                    },
                    audio: false
                };

                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                videoElement.srcObject = stream;
                hasCamera = true;
                cameraInitialized = true;

                const cameraFeed = new Camera(videoElement, {
                    onFrame: async () => {
                        await hands.send({ image: videoElement });
                    },
                    width: 640,
                    height: 480
                });
                cameraFeed.start();

            } catch (err) {
                console.warn("La cámara web no está disponible o fue bloqueada. Usando modo interactivo táctil.", err);
                trackingText.innerText = "Modo Táctil e Inercia Activos";
                trackingIndicator.classList.remove('bg-red-500');
                trackingIndicator.classList.add('bg-blue-500');
            }
        }

        
        window.addEventListener('load', () => {
            startWebcam();
            resize();
        });

        window.addEventListener('touchstart', () => {
            if (!cameraInitialized) {
                startWebcam();
            }
        }, { once: true });

        window.addEventListener('click', () => {
            if (!cameraInitialized) {
                startWebcam();
            }
        }, { once: true });

        function onPointerDown(event) {
            isUserDragging = true;
            previousMousePosition = {
                x: event.clientX || (event.touches ? event.touches[0].clientX : 0),
                y: event.clientY || (event.touches ? event.touches[0].clientY : 0)
            };
        }

        function onPointerMove(event) {
            if (!isUserDragging) return;

            const clientX = event.clientX || (event.touches ? event.touches[0].clientX : 0);
            const clientY = event.clientY || (event.touches ? event.touches[0].clientY : 0);

            const deltaX = clientX - previousMousePosition.x;
            const deltaY = clientY - previousMousePosition.y;

            rotationAngleY += deltaX * 0.005;
            rotationAngleX += deltaY * 0.005;

            previousMousePosition = { x: clientX, y: clientY };
        }

        function onPointerUp() {
            isUserDragging = false;
        }

        window.addEventListener('mousedown', onPointerDown);
        window.addEventListener('mousemove', onPointerMove);
        window.addEventListener('mouseup', onPointerUp);

        window.addEventListener('touchstart', onPointerDown, { passive: true });
        window.addEventListener('touchmove', onPointerMove, { passive: true });
        window.addEventListener('touchend', onPointerUp);

        function animate() {
            requestAnimationFrame(animate);
            globalTime += 0.005;

            currentExpansionFactor += (targetExpansionFactor - currentExpansionFactor) * 0.08;
            currentRotationSpeedY += (targetRotationSpeedY - currentRotationSpeedY) * 0.08;
            currentRotationSpeedX += (targetRotationSpeedX - currentRotationSpeedX) * 0.08;

            const finalScale = currentExpansionFactor * responsiveScale;
            const posAttr = geometry.attributes.position.array;


            const waveFrequency = 1.5;
            

            const waveAmplitude = activeTracking ? 0.025 : 0.045; 
            const waveSpeed = 2.0;


            const lerpSpeed = activeTracking ? 0.08 : 0.12;
            
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const i3 = i * 3;
                const tx = targets[i3] * finalScale;
                const ty = targets[i3 + 1] * finalScale;
                const tz = targets[i3 + 2] * finalScale;

                const swirlSpeed = (activeTracking ? 0.20 : 0.65) * randomSpeeds[i] * globalTime;
                const cosS = Math.cos(swirlSpeed);
                const sinS = Math.sin(swirlSpeed);
                
                const rx = tx * cosS - tz * sinS;
                const rz = tx * sinS + tz * cosS;

                const phaseX = rx * waveFrequency + globalTime * waveSpeed * randomSpeeds[i];
                const phaseY = ty * waveFrequency + globalTime * waveSpeed * 0.8;
                const phaseZ = rz * waveFrequency + globalTime * waveSpeed * 1.2;

                const dx = Math.sin(phaseY) * waveAmplitude;
                const dy = Math.cos(phaseZ) * waveAmplitude;
                const dz = Math.sin(phaseX) * waveAmplitude;

                const noiseX = Math.sin(globalTime * randomSpeeds[i] * 0.8 + i * 0.01) * 0.02;
                const noiseY = Math.cos(globalTime * randomSpeeds[i] * 0.6 + i * 0.01) * 0.02;
                const noiseZ = Math.sin(globalTime * randomSpeeds[i] * 1.1 + i * 0.02) * 0.02;

                const finalTargetX = rx + dx + noiseX;
                const finalTargetY = ty + dy + noiseY;
                const finalTargetZ = rz + dz + noiseZ;

                posAttr[i3] += (finalTargetX - posAttr[i3]) * lerpSpeed;
                posAttr[i3 + 1] += (finalTargetY - posAttr[i3 + 1]) * lerpSpeed;
                posAttr[i3 + 2] += (finalTargetZ - posAttr[i3 + 2]) * lerpSpeed;
            }
            geometry.attributes.position.needsUpdate = true;
            particleSystem.rotation.y += currentRotationSpeedY;
            particleSystem.rotation.x += currentRotationSpeedX;
            
            particleSystem.rotation.x += (rotationAngleX - particleSystem.rotation.x) * 0.08;
            particleSystem.rotation.y += (rotationAngleY - particleSystem.rotation.y) * 0.08;

            renderer.render(scene, camera);
        }

        function resize() {
            const width = window.innerWidth;
            const height = window.innerHeight;

            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            updateResponsiveScale();
            material.size = width < 768 ? 0.08 : 0.065;
            material.needsUpdate = true;
        }

        window.addEventListener('resize', resize);
        
        // Iniciar el bucle de render
        animate();
    </script>
</body>
</html>
